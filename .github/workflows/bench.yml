name: Benchmark

on:
  push:
    paths: ["**.rs", "**.c*", "**.py", "**.toml", "**.lock", "meson.build", "**/bench.yml"]
  pull_request:
    paths: ["**.rs", "**.c*", "**.py", "**.toml", "**.lock", "meson.build", "**/bench.yml"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: "always"
  DEBIAN_FRONTEND: noninteractive

jobs:
  x86_64-linux:
    name: Benchmark on x86_64 Linux (Ubuntu)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: download deps
        run: |
          sudo apt-get -y -q install gcc llvm-16-dev
          pip install meson ninja numba==0.62.1
      - name: run bench
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python3 py/speedometer.py && time python3 py-numba/numbed.py
  aarch64-linux:
    name: Benchmark on AArch64 Linux (Ubuntu)
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: download deps
        run: |
          sudo apt-get -y -q install gcc llvm-16-dev
          pip install meson ninja numba==0.62.1
      - name: run bench
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python3 py/speedometer.py && time python3 py-numba/numbed.py

  x86_64-macos:
    name: Benchmark on x86_64 MacOS
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: download deps
        env:
          CMAKE_PREFIX_PATH: "/usr/local/opt/llvm@20"
        run: |
          brew update && brew install meson llvm@20
          pip install -q numba
      - name: run bench
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python3 py/speedometer.py && time python3 py-numba/numbed.py
  aarch64-macos:
    name: Benchmark on AArch64 MacOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: download deps
        env:
          CMAKE_PREFIX_PATH: "/usr/local/opt/llvm@20"
        run: |
          brew update && brew install meson llvm@20
          pip install -q numba
      - name: run bench
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python3 py/speedometer.py && time python3 py-numba/numbed.py
  x86_64-windows-gnu:
    name: Benchmark on x86_64 Windows (MinGW)
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: UCRT64
          update: true
          pacboy: >-
            cc
            rustup
            python
            meson
            python-numba
      - name: run bench
        shell: msys2 {0}
        env:
          RUSTUP_TOOLCHAIN: nightly-x86_64-pc-windows-gnu
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python py/speedometer.py && time python py-numba/numbed.py
  x86_64-windows-gnullvm:
    name: Benchmark on x86_64 Windows (MinGW/LLVM)
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: CLANG64
          update: true
          pacboy: >-
            cc
            rustup
            python
            meson
            python-numba
      - name: run bench
        shell: msys2 {0}
        env:
          RUSTUP_TOOLCHAIN: nightly-x86_64-pc-windows-gnullvm
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python py/speedometer.py && time python py-numba/numbed.py
  x86_64-windows-msvc:
    name: Benchmark on x86_64 Windows (MSVC)
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: download deps
        run: |
          pip install -q numba meson ninja
      - name: run bench
        run: |
          meson setup --vsenv build
          meson compile -C build
          meson test --benchmark -C build
          Measure-Command { python py/speedometer.py } && Measure-Command { python py-numba/numbed.py }
  aarch64-windows-gnullvm:
    name: Benchmark on AArch64 Windows (MinGW/LLVM)
    runs-on: windows-11-arm
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: CLANGARM64
          update: true
          pacboy: >-
            cc
            rustup
            python
            meson
            python-numba
      - name: run bench
        shell: msys2 {0}
        env:
          RUSTUP_TOOLCHAIN: nightly-aarch64-pc-windows-gnullvm
        run: |
          meson setup build
          meson compile -C build
          meson test --benchmark -C build
          time python py/speedometer.py && time python py-numba/numbed.py
  aarch64-windows-msvc:
    name: Benchmark on AArch64 Windows (MSVC)
    runs-on: windows-11-arm
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: download deps
        run: |
          pip install -q meson ninja
      - name: run bench
        run: |
          meson setup --vsenv build
          meson compile -C build
          meson test --benchmark -C build
          Measure-Command { python py/speedometer.py }
